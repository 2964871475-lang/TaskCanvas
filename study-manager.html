<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学习管理系统</title>
<style>
/* ===== 基础变量与全局样式 ===== */
:root{
  --bg:#0f0f1a;--bg2:#1a1a2e;--bg3:#16213e;--surface:#222244;--surface-hover:#2a2a55;
  --text:#f0f0f5;--text2:#9090a5;--math:#4fc3f7;--cs:#66bb6a;--eng:#ffb74d;
  --class:#90a4ae;--rest:#5c6bc0;--review:#ce93d8;--accent:#e94560;
  --success:#4caf50;--border:#333355;--radius:12px;
  --glass:rgba(255,255,255,.05);--glow:rgba(79,195,247,.3);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
::selection{background:rgba(233,69,96,.35);color:#fff}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px;transition:background .3s}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.22)}
body{
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  background:var(--bg);
  background-image:
    radial-gradient(ellipse at 20% 0%, rgba(79,195,247,.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 100%, rgba(233,69,96,.08) 0%, transparent 50%),
    linear-gradient(135deg, var(--bg) 0%, #0a0a15 100%);
  color:var(--text);
  height:100vh;
  overflow:hidden;
  animation:bgFadeIn 0.6s ease;
}
@keyframes bgFadeIn{from{opacity:0}to{opacity:1}}
@keyframes ambientGlow{
  0%,100%{opacity:.5}
  50%{opacity:1}
}

/* ===== 主布局 ===== */
.app{display:flex;height:100vh;animation:appSlideIn 0.5s ease}
@keyframes appSlideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ===== 侧边栏 - 玻璃态效果 ===== */
.sidebar{
  width:210px;
  background:linear-gradient(180deg, rgba(26,26,46,.97), rgba(22,33,62,.97));
  backdrop-filter:blur(30px) saturate(1.4);
  -webkit-backdrop-filter:blur(30px) saturate(1.4);
  border-right:1px solid rgba(255,255,255,.08);
  display:flex;
  flex-direction:column;
  padding:16px 10px;
  gap:4px;
  overflow-y:auto;
  position:relative;
  transition:width .3s cubic-bezier(.4,0,.2,1);
}
.sidebar::before{
  content:'';
  position:absolute;
  top:0;left:0;right:0;
  height:100px;
  background:linear-gradient(to bottom, rgba(79,195,247,.05), transparent);
  pointer-events:none;
}
.sidebar h1{
  font-size:15px;
  margin-bottom:12px;
  color:var(--accent);
  letter-spacing:2px;
  font-weight:700;
  text-shadow:0 0 20px rgba(233,69,96,.3);
}
.nav-btn{
  padding:10px 14px;
  border-radius:var(--radius);
  cursor:pointer;
  font-size:13px;
  color:var(--text2);
  background:transparent;
  border:none;
  text-align:left;
  transition:all .25s cubic-bezier(.4,0,.2,1);
  display:flex;
  align-items:center;
  gap:8px;
  position:relative;
  overflow:hidden;
}
.nav-btn::before{
  content:'';
  position:absolute;
  left:0;top:50%;
  width:3px;height:0;
  background:var(--accent);
  transform:translateY(-50%);
  transition:height .2s ease;
  border-radius:0 2px 2px 0;
}
.nav-btn:hover{
  background:var(--glass);
  color:var(--text);
  transform:translateX(4px);
}
.nav-btn:hover::before{height:60%}
.nav-btn.active{
  background:rgba(233,69,96,.1);
  color:var(--text);
  font-weight:600;
  box-shadow:0 4px 15px rgba(233,69,96,.1);
}
.nav-btn.active::before{height:80%;background:var(--accent)}
.nav-btn:active{transform:scale(.96)}
.nav-btn:focus-visible{
  outline:2px solid rgba(233,69,96,.5);
  outline-offset:-2px;
  border-radius:var(--radius);
}
button:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible{
  outline:2px solid rgba(79,195,247,.4);
  outline-offset:2px;
  border-radius:2px;
}
.nav-btn .icon{font-size:18px;width:24px;text-align:center;filter:drop-shadow(0 1px 2px rgba(0,0,0,.3))}
.nav-btn.active .icon{animation:iconBounce .4s cubic-bezier(.4,0,.2,1)}
@keyframes iconBounce{
  0%{transform:scale(1)}
  30%{transform:scale(1.25)}
  100%{transform:scale(1)}
}
.sidebar-footer{
  margin-top:auto;
  font-size:10px;
  color:var(--text2);
  padding:8px;
  opacity:.6;
  letter-spacing:.5px;
}
/* ===== 主内容区域 ===== */
.main{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  padding:20px;
  background:linear-gradient(to bottom, transparent, rgba(0,0,0,.2));
  position:relative;
}

/* ===== 页面切换动画 ===== */
.page{
  position:absolute;
  top:0;left:0;right:0;
  visibility:hidden;
  opacity:0;
  transform:translateY(8px);
  transition:opacity .3s cubic-bezier(.4,0,.2,1),transform .3s cubic-bezier(.4,0,.2,1),visibility 0s .3s;
  pointer-events:none;
}
.page.active{
  position:relative;
  visibility:visible;
  opacity:1;
  transform:translateY(0);
  transition:opacity .35s cubic-bezier(.4,0,.2,1),transform .35s cubic-bezier(.4,0,.2,1),visibility 0s 0s;
  pointer-events:auto;
}

/* ===== 倒计时栏 ===== */
.countdown-bar{
  background:linear-gradient(135deg, var(--bg3), var(--surface));
  border-radius:var(--radius);
  padding:14px 20px;
  margin-bottom:20px;
  display:flex;
  align-items:center;
  gap:20px;
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 4px 20px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.03);
  animation:barSlideIn .4s ease .1s backwards;
  position:relative;
}
.countdown-bar::before{
  content:'';
  position:absolute;
  top:-1px;left:-1px;right:-1px;bottom:-1px;
  border-radius:var(--radius);
  background:linear-gradient(135deg, rgba(233,69,96,.3), transparent 40%, transparent 60%, rgba(79,195,247,.3));
  z-index:-1;
  animation:borderGlow 4s ease-in-out infinite;
}
@keyframes borderGlow{
  0%,100%{opacity:.3}
  50%{opacity:.8}
}
@keyframes barSlideIn{from{opacity:0;transform:translateY(-10px)}}
.countdown-bar .days{
  font-size:28px;
  font-weight:800;
  background:linear-gradient(135deg, var(--accent), #ff6b7f);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  animation:daysPulse 2s ease-in-out infinite;
}
@keyframes daysPulse{
  0%,100%{filter:brightness(1);transform:scale(1)}
  50%{filter:brightness(1.2);transform:scale(1.04)}
}
.countdown-bar .label{font-size:12px;color:var(--text2);letter-spacing:.5px}
.countdown-bar .stats{
  margin-left:auto;
  font-size:12px;
  color:var(--text2);
  display:flex;
  gap:16px;
}
.countdown-bar .stats b{
  color:var(--text);
  font-weight:600;
  transition:color .2s;
}

/* ===== 任务日程 ===== */
.tasks-header{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:18px;
  animation:headerIn .4s ease .15s backwards;
}
@keyframes headerIn{from{opacity:0;transform:translateX(-10px)}}
.tasks-header h2{font-size:20px;font-weight:700;letter-spacing:.5px}
.week-nav{display:flex;gap:6px;flex-wrap:wrap}
.day-btn{
  padding:6px 12px;
  border-radius:8px;
  cursor:pointer;
  font-size:11px;
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text2);
  transition:all .2s cubic-bezier(.4,0,.2,1);
  position:relative;
}
.day-btn:hover{
  background:var(--surface-hover);
  transform:translateY(-1px);
  box-shadow:0 2px 8px rgba(0,0,0,.2);
}
.day-btn.active{
  background:linear-gradient(135deg, var(--bg3), var(--surface));
  color:var(--text);
  border-color:transparent;
  font-weight:600;
  box-shadow:0 3px 12px rgba(0,0,0,.3);
}
.task-progress{font-size:12px;color:var(--text2);margin-left:auto}
.task-progress span{color:var(--success);font-weight:700}

.task-timeline{display:flex;flex-direction:column;gap:6px}
.task-block{
  display:flex;
  align-items:stretch;
  gap:8px;
  padding:8px 12px;
  border-radius:var(--radius);
  background:var(--surface);
  border:1px solid rgba(255,255,255,.08);
  cursor:pointer;
  transition:all .2s cubic-bezier(.4,0,.2,1);
  min-height:42px;
  position:relative;
  overflow:hidden;
}
.task-block::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, transparent, rgba(255,255,255,.02));
  opacity:0;
  transition:opacity .2s;
}
.task-block:hover{
  background:var(--surface-hover);
  transform:translateX(3px);
  box-shadow:0 4px 15px rgba(0,0,0,.2);
}
.task-block:hover::after{opacity:1}
.task-block.done{
  opacity:.6;
  background:rgba(34,34,68,.5);
  border-color:rgba(76,175,80,.3);
}
.task-block.done .task-stripe{animation:stripeGlow .4s ease}
@keyframes stripeGlow{0%,100%{box-shadow:none}50%{box-shadow:0 0 8px currentColor}}
.task-block.done .task-check{
  background:var(--success);
  border-color:var(--success);
  animation:checkPop .3s cubic-bezier(.4,0,.2,1);
}
@keyframes checkPop{
  0%{transform:scale(0)}
  50%{transform:scale(1.2)}
  100%{transform:scale(1)}
}
.task-block.done .task-check::after{opacity:1}
.task-time{font-size:11px;color:var(--text2);min-width:72px;padding-top:3px;font-weight:500}
.task-check{
  width:20px;height:20px;
  border-radius:5px;
  border:2px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto 0;
  transition:all .2s;
  flex-shrink:0;
}
.task-check::after{
  content:'\2713';
  color:white;
  font-size:13px;
  font-weight:700;
  opacity:0;
  transition:opacity .2s;
}
.task-content{flex:1;font-size:13px;line-height:1.5;display:flex;align-items:center}
.task-subject{
  font-size:10px;
  font-weight:700;
  padding:2px 6px;
  border-radius:5px;
  margin-left:8px;
  white-space:nowrap;
  letter-spacing:.5px;
}
.task-stripe{width:4px;border-radius:2px;margin-right:4px;flex-shrink:0}
.task-stats{
  margin-top:16px;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  animation:statsIn .5s ease .2s backwards;
}
@keyframes statsIn{from{opacity:0;transform:translateY(10px)}}
.stat-card{
  background:linear-gradient(135deg, var(--surface), var(--bg3));
  border-radius:var(--radius);
  padding:14px;
  text-align:center;
  border:1px solid rgba(255,255,255,.06);
  transition:transform .25s cubic-bezier(.4,0,.2,1),box-shadow .25s cubic-bezier(.4,0,.2,1),border-color .25s;
  cursor:default;
}
.stat-card:hover{
  transform:translateY(-3px);
  box-shadow:0 8px 25px rgba(0,0,0,.25);
  border-color:rgba(255,255,255,.12);
}
.stat-card .val{font-size:22px;font-weight:800}
.stat-card .label{font-size:10px;color:var(--text2);margin-top:4px;letter-spacing:.5px}

/* ===== 科目标签 ===== */
.task-subject.math{background:rgba(79,195,247,.15);color:var(--math);border:1px solid rgba(79,195,247,.2)}
.task-subject.cs{background:rgba(102,187,106,.15);color:var(--cs);border:1px solid rgba(102,187,106,.2)}
.task-subject.eng{background:rgba(255,183,77,.15);color:var(--eng);border:1px solid rgba(255,183,77,.2)}
.task-subject.class{background:rgba(144,164,174,.15);color:var(--class);border:1px solid rgba(144,164,174,.2)}
.task-subject.rest{background:rgba(92,107,176,.15);color:var(--rest);border:1px solid rgba(92,107,176,.2)}
.task-subject.review{background:rgba(206,147,216,.15);color:var(--review);border:1px solid rgba(206,147,216,.2)}

/* ===== 记忆卡片 ===== */
.fc-tabs{display:flex;gap:6px;margin-bottom:14px;animation:tabsIn .4s ease backwards}
@keyframes tabsIn{from{opacity:0;transform:translateY(-5px)}}
.fc-tab{
  padding:8px 16px;
  border-radius:var(--radius);
  cursor:pointer;
  background:var(--surface);
  color:var(--text2);
  border:1px solid rgba(255,255,255,.08);
  font-size:13px;
  transition:all .25s cubic-bezier(.4,0,.2,1);
  position:relative;
  overflow:hidden;
}
.fc-tab::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,.05), transparent);
  opacity:0;
  transition:opacity .2s;
}
.fc-tab:hover{
  background:var(--surface-hover);
  transform:translateY(-2px);
  box-shadow:0 4px 12px rgba(0,0,0,.2);
}
.fc-tab:hover::before{opacity:1}
.fc-tab.active{
  background:linear-gradient(135deg, var(--bg3), var(--surface));
  color:var(--text);
  border-color:transparent;
  font-weight:600;
  box-shadow:0 6px 20px rgba(0,0,0,.25);
}
.fc-tab:active{transform:scale(.96)}
.fc-badge{
  background:linear-gradient(135deg, var(--accent), #d83850);
  color:white;
  font-size:10px;
  padding:2px 6px;
  border-radius:10px;
  margin-left:5px;
  font-weight:700;
  animation:badgePulse 1.5s ease-in-out infinite;
}
@keyframes badgePulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.08)}
}
.fc-review{max-width:520px;margin:0 auto}
.fc-empty{text-align:center;padding:40px;color:var(--text2);font-size:14px;animation:emptyFadeIn .3s ease}
@keyframes emptyFadeIn{from{opacity:0;transform:scale(.95)}}
.fc-empty .big{font-size:48px;margin-bottom:10px;opacity:.7}

/* ===== 3D卡片翻转 ===== */
.fc-card-container{
  perspective:1000px;
  margin-bottom:14px;
}
.fc-card{
  position:relative;
  width:100%;
  min-height:200px;
  transition:transform .6s cubic-bezier(.25,.1,.25,1);
  transform-style:preserve-3d;
  cursor:pointer;
}
.fc-card:hover{transform:scale(1.01)}
.fc-card.flipped{transform:rotateY(180deg)}
.fc-card.flipped:hover{transform:rotateY(180deg) scale(1.01)}
.fc-front,.fc-back{
  position:absolute;
  top:0;left:0;
  width:100%;
  min-height:200px;
  backface-visibility:hidden;
  border-radius:var(--radius);
  padding:24px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  box-shadow:0 8px 30px rgba(0,0,0,.3);
}
.fc-front{
  background:linear-gradient(135deg, var(--surface), var(--bg3));
  border:1px solid rgba(255,255,255,.1);
}
.fc-front:hover{box-shadow:0 12px 40px rgba(0,0,0,.4)}
.fc-back{
  background:linear-gradient(135deg, var(--bg3), rgba(79,195,247,.1));
  border:2px solid rgba(79,195,247,.3);
  transform:rotateY(180deg);
  box-shadow:0 8px 30px rgba(79,195,247,.1);
}
.fc-front .fc-label,.fc-back .fc-label{
  font-size:11px;
  color:var(--text2);
  margin-bottom:8px;
  letter-spacing:1px;
  font-weight:600;
}
.fc-front .fc-text,.fc-back .fc-text{
  font-size:14px;
  text-align:center;
  line-height:1.6;
  max-width:90%;
}
.fc-hint{font-size:11px;color:var(--text2);text-align:center;margin-top:8px;opacity:.7}
.fc-difficulty{
  display:flex;
  gap:8px;
  justify-content:center;
  margin-top:10px;
  animation:diffIn .3s ease;
}
@keyframes diffIn{from{opacity:0;transform:translateY(10px)}}
.diff-btn{
  padding:10px 16px;
  border-radius:var(--radius);
  cursor:pointer;
  font-size:12px;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--text2);
  transition:all .2s cubic-bezier(.4,0,.2,1);
  font-weight:500;
}
.diff-btn:hover{
  background:var(--surface-hover);
  color:var(--text);
  transform:translateY(-2px);
  box-shadow:0 4px 12px rgba(0,0,0,.2);
}
.diff-btn:active{transform:scale(.95) translateY(0)}
.diff-btn.d1:hover{border-color:#f44336;color:#f44336;box-shadow:0 4px 12px rgba(244,67,54,.2)}
.diff-btn.d2:hover{border-color:#ff9800;color:#ff9800;box-shadow:0 4px 12px rgba(255,152,0,.2)}
.diff-btn.d3:hover{border-color:#ffc107;color:#ffc107;box-shadow:0 4px 12px rgba(255,193,7,.2)}
.diff-btn.d4:hover{border-color:#8bc34a;color:#8bc34a;box-shadow:0 4px 12px rgba(139,195,74,.2)}
.diff-btn.d5:hover{border-color:#4caf50;color:#4caf50;box-shadow:0 4px 12px rgba(76,175,80,.2)}
.fc-counter{text-align:center;font-size:12px;color:var(--text2);margin-bottom:10px;font-weight:500}

/* ===== 创建卡片表单 ===== */
.fc-create{max-width:520px;margin:0 auto;animation:createIn .4s ease}
@keyframes createIn{from{opacity:0;transform:translateY(10px)}}
.fc-create h3{font-size:15px;margin-bottom:12px;font-weight:700}
.form-group{margin-bottom:12px}
.form-group label{font-size:12px;color:var(--text2);margin-bottom:4px;display:block;font-weight:500}
.form-group input,.form-group textarea,.form-group select{
  width:100%;
  padding:10px 14px;
  border-radius:var(--radius);
  background:var(--bg);
  border:1px solid rgba(255,255,255,.1);
  color:var(--text);
  font-size:14px;
  font-family:inherit;
  transition:all .2s;
}
.form-group textarea{min-height:80px;resize:vertical}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{
  outline:none;
  border-color:var(--math);
  box-shadow:0 0 0 3px rgba(79,195,247,.1);
}
.create-btn{
  padding:10px 20px;
  border-radius:var(--radius);
  background:linear-gradient(135deg, var(--accent), #d83850);
  color:white;
  font-size:14px;
  border:none;
  cursor:pointer;
  transition:all .25s cubic-bezier(.4,0,.2,1);
  font-weight:600;
  box-shadow:0 4px 15px rgba(233,69,96,.3);
}
.create-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(233,69,96,.4);
}
.create-btn:active{transform:scale(.96) translateY(0)}

/* ===== 卡片浏览 ===== */
.fc-browse{display:flex;flex-direction:column;gap:14px}
.subject-group h3{font-size:14px;margin-bottom:8px;font-weight:700}
.card-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:8px}
.card-item{
  background:linear-gradient(135deg, var(--surface), var(--bg3));
  border-radius:var(--radius);
  padding:12px;
  border:1px solid rgba(255,255,255,.08);
  cursor:pointer;
  transition:all .25s cubic-bezier(.4,0,.2,1);
}
.card-item:hover{
  background:var(--surface-hover);
  transform:translateY(-3px);
  box-shadow:0 8px 25px rgba(0,0,0,.3);
  border-color:rgba(255,255,255,.12);
}
.card-item .front-preview{font-size:13px;font-weight:600;line-height:1.4}
.card-item .meta{font-size:11px;color:var(--text2);margin-top:6px}
.card-item .meta .due{color:var(--accent);font-weight:600}
.card-item .tag{
  font-size:10px;
  padding:2px 6px;
  border-radius:5px;
  background:rgba(79,195,247,.1);
  color:var(--math);
  font-weight:500;
}
.delete-btn{
  font-size:11px;
  color:var(--accent);
  cursor:pointer;
  margin-top:6px;
  opacity:.6;
  transition:opacity .2s;
}
.delete-btn:hover{opacity:1}

/* ===== 每日复盘 ===== */
.review-page{max-width:620px;margin:0 auto}
.review-date-nav{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:14px;
  animation:reviewNavIn .4s ease backwards;
}
@keyframes reviewNavIn{from{opacity:0;transform:translateY(-5px)}}
.review-date-nav h3{font-size:16px;font-weight:700}
.review-date-btn{
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
  font-size:11px;
  background:var(--surface);
  border:1px solid rgba(255,255,255,.08);
  color:var(--text2);
  transition:all .2s;
}
.review-date-btn:hover{
  background:var(--surface-hover);
  transform:translateY(-1px);
}
.review-date-btn.active{
  background:linear-gradient(135deg, var(--bg3), var(--surface));
  color:var(--text);
  border-color:transparent;
  font-weight:600;
}
.review-form{

  padding:20px;
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 6px 25px rgba(0,0,0,.2);

}
@keyframes formIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.review-q{margin-bottom:16px}
.review-q label{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px;display:block}
.review-q .hint{font-size:11px;color:var(--text2);margin-bottom:6px;opacity:.7}
.review-q textarea{
  width:100%;
  padding:10px 14px;
  border-radius:var(--radius);
  background:var(--bg);
  border:1px solid rgba(255,255,255,.1);
  color:var(--text);
  font-size:14px;
  font-family:inherit;
  min-height:70px;
  resize:vertical;
  transition:all .2s;
}
.review-q textarea:focus{
  outline:none;
  border-color:var(--review);

}
.review-tasks-summary{

.review-history-item{

/* ===== 进度看板 ===== */
.progress-page h2{font-size:20px;margin-bottom:18px;font-weight:700;animation:progHeaderIn .4s ease backwards}

.progress-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.progress-section{

}

.chapter-row{

}

  content:'';

}

.progress-edit-btn{

.progress-edit-overlay{
  position:fixed;

  justify-content:center;

}
@keyframes overlayIn{from{opacity:0}}
.progress-edit-panel{

.progress-edit-panel h3{font-size:16px;margin-bottom:14px;font-weight:700}

.tip-to-card:hover{opacity:1}

/* Data */
.data-page{max-width:500px;margin:0 auto}
.data-page h3{font-size:14px;margin-bottom:14px}
.data-section{margin-bottom:20px}
.data-section h4{font-size:12px;margin-bottom:6px;color:var(--text2)}
.data-btn{padding:8px 14px;border-radius:var(--radius);cursor:pointer;font-size:12px;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:.2s;display:inline-flex;align-items:center;gap:6px}
.data-btn:hover{background:var(--surface-hover)}
.data-btn.danger{border-color:var(--accent);color:var(--accent)}
.data-btn.danger:hover{background:rgba(233,69,96,.15)}
.import-area{width:100%;min-height:100px;padding:10px;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:12px;font-family:monospace;resize:vertical;margin-top:6px}
.import-area:focus{outline:none;border-color:var(--math)}
.import-btns{display:flex;gap:6px;margin-top:6px}

/* ===== 涟漪效果 ===== */
.ripple{
  position:relative;
  overflow:hidden;
}
.ripple::after{
  content:'';
  position:absolute;
  border-radius:50%;
  background:rgba(255,255,255,.2);
  transform:scale(0);
  pointer-events:none;
}
.ripple:active::after{
  animation:rippleAnim .5s ease-out;
}
@keyframes rippleAnim{
  to{transform:scale(4);opacity:0}
}

/* ===== 庆祝粒子 ===== */
.celebrate{
  position:fixed;
  pointer-events:none;
  z-index:999;
}
.celebrate .particle{
  position:absolute;
  width:8px;height:8px;
  border-radius:50%;
  animation:particleBurst .7s ease-out forwards;
}
@keyframes particleBurst{
  0%{transform:translate(0,0) scale(1);opacity:1}
  100%{transform:translate(var(--px),var(--py)) scale(0);opacity:0}
}

@media(max-width:768px){
  .app{flex-direction:column}
  .sidebar{width:100%;flex-direction:row;padding:8px 6px;border-right:none;border-bottom:1px solid rgba(255,255,255,.08);overflow-x:auto;overflow-y:hidden;gap:2px;flex-shrink:0}
  .sidebar h1{display:none}
  .sidebar-footer{display:none}
  .nav-btn{padding:8px 10px;font-size:11px;white-space:nowrap;border-radius:10px}

  .main{padding:12px}
  .task-stats{grid-template-columns:repeat(2,1fr)}
  .progress-grid{grid-template-columns:1fr}
  .countdown-bar{flex-wrap:wrap;gap:8px;padding:12px 16px}

}

}
</style>
</head>
<body>
<div class="app">

<script>
// ===== Data Manager =====
const DM={
  _k:{tasks:'sm_tasks',cards:'sm_cards',reviews:'sm_reviews',progress:'sm_progress',tips:'sm_tips'},
  get(k){return JSON.parse(localStorage.getItem(this._k[k])||'[]')},
  save(k,v){localStorage.setItem(this._k[k],JSON.stringify(v))},
  exportAll(){return JSON.stringify({tasks:this.get('tasks'),cards:this.get('cards'),reviews:this.get('reviews'),progress:this.get('progress'),tips:this.get('tips')},null,2)},
  importAll(d){if(d.tasks)this.save('tasks',d.tasks);if(d.cards)this.save('cards',d.cards);if(d.reviews)this.save('reviews',d.reviews);if(d.progress)this.save('progress',d.progress);if(d.tips)this.save('tips',d.tips)},
  clearAll(){Object.values(this._k).forEach(k=>localStorage.removeItem(k))}
};

// ===== Countdown & Stats =====
function renderCountdown(){
  const examDate=new Date('2026-12-20'); // 考研通常12月底
  const today=new Date();
  const diff=Math.ceil((examDate-today)/(1000*60*60*24));
  const tasks=TM.tasks;
  const todayTasks=TM.getForDay(TM.todayKey());
  const doneToday=todayTasks.filter(t=>t.done&&t.subject!=='class'&&t.subject!=='rest');
  const studyMins=doneToday.reduce((sum,t)=>sum+TM.parseMinutes(t.time),0);
  // recent 7 days study mins
  const recentDays=TM.getDays().slice(-7);
  let recentMins=0;
  recentDays.forEach(d=>{TM.getForDay(d).filter(t=>t.done&&t.subject!=='class'&&t.subject!=='rest').forEach(t=>recentMins+=TM.parseMinutes(t.time))});
  const avgMins=recentDays.length?Math.round(recentMins/recentDays.length):0;

  document.getElementById('countdownBar').innerHTML=`
    <div><div class="days">${diff}</div><div class="label">距考研（天）</div></div>
    <div class="stats">
      <div>今日学习 <b>${Math.round(studyMins/60)}h${studyMins%60}m</b></div>
      <div>近7日均 <b>${Math.round(avgMins/60)}h${avgMins%60}m</b></div>
    </div>`;
}

// ===== View =====
function showPage(name){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.nav-btn[onclick="showPage('${name}')"]`).classList.add('active');
  if(name==='tasks')renderTasks();
  if(name==='flashcard')renderFlashcard();
  if(name==='review')renderReview();
  if(name==='progress')renderProgress();
  if(name==='tips')renderTips();
  renderCountdown();
}

function renderTasks(){
  const days=TM.getDays();
  const nav=document.getElementById('weekNav');
  const tk=TM.todayKey();
  nav.innerHTML=days.map(d=>{const o=new Date(d);const w=['日','一','二','三','四','五','六'][o.getDay()];const l=`${o.getMonth()+1}/${o.getDate()}周${w}`;const cls=d===TM.currentDay?'active':'';return`<button class="day-btn ${cls}" onclick="switchDay('${d}')">${l}</button>`}).join('');
  const tasks=TM.getForDay(TM.currentDay);
  const dc=tasks.filter(t=>t.done).length;
  document.getElementById('taskProgress').innerHTML=`完成 <span>${dc}/${tasks.length}</span>`;
  document.getElementById('taskTimeline').innerHTML=tasks.map(t=>{const c=TM.color(t.subject);const l=TM.label(t.subject);const cls=t.done?'done':'';return`<div class="task-block ${cls}" onclick="toggleTask(${t.id})"><div class="task-stripe" style="background:${c}"></div><div class="task-time">${t.time}</div><div class="task-check"></div><div class="task-content">${t.content}<span class="task-subject ${t.subject}">${l}</span></div></div>`}).join('');
  const subjects={};tasks.forEach(t=>{if(!subjects[t.subject])subjects[t.subject]={total:0,done:0};subjects[t.subject].total++;if(t.done)subjects[t.subject].done++});
  const stats=document.getElementById('taskStats');
  const entries=Object.entries(subjects);
  stats.innerHTML=entries.slice(0,3).map(([s,v])=>`<div class="stat-card"><div class="val" style="color:${TM.color(s)}">${v.done}/${v.total}</div><div class="label">${TM.label(s)}完成率</div></div>`).join('');
}
function switchDay(d){TM.currentDay=d;renderTasks()}
function toggleTask(id){
  const wasDone=TM.tasks.find(t=>t.id===id)?.done;
  TM.toggleDone(id);
  renderTasks();renderCountdown();
  // 庆祝粒子效果 - 仅在完成任务时触发
  if(!wasDone){
    const el=document.querySelector(`.task-block[onclick="toggleTask(${id})"]`);
    if(el){const r=el.getBoundingClientRect();createParticles(r.left+r.width/2,r.top+r.height/2)}
  }
}
function createParticles(x,y){
  const colors=['#e94560','#4fc3f7','#66bb6a','#ffb74d','#ce93d8','#fff'];
  const container=document.createElement('div');
  container.className='celebrate';
  container.style.left=x+'px';container.style.top=y+'px';
  for(let i=0;i<12;i++){
    const p=document.createElement('div');
    p.className='particle';
    const angle=(Math.PI*2*i)/12;
    const dist=30+Math.random()*40;
    p.style.setProperty('--px',Math.cos(angle)*dist+'px');
    p.style.setProperty('--py',Math.sin(angle)*dist+'px');
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDelay=Math.random()*.1+'s';
    container.appendChild(p);
  }
  document.body.appendChild(container);
  setTimeout(()=>container.remove(),800);
}

// Flashcard
let curFcTab='review';
function showFcTab(tab){curFcTab=tab;document.querySelectorAll('.fc-tab').forEach(t=>t.classList.remove('active'));document.querySelector(`.fc-tab[onclick="showFcTab('${tab}')"]`).classList.add('active');document.getElementById('fc-review').style.display=tab==='review'?'':'none';document.getElementById('fc-create').style.display=tab==='create'?'':'none';document.getElementById('fc-browse').style.display=tab==='browse'?'':'none';renderFlashcard()}
function renderFlashcard(){const due=FM.getDue();document.getElementById('fcBadge').textContent=due.length;if(curFcTab==='review')renderFcReview(due);if(curFcTab==='browse')renderFcBrowse()}
function renderFcReview(due){const c=document.getElementById('fc-review');if(!due.length){c.innerHTML='<div class="fc-empty"><div class="big">✔</div>今日没有待复习的卡片</div>';return}if(FM.ri>=due.length)FM.ri=0;const card=due[FM.ri];FM.flipped=false;c.innerHTML=`<div class="fc-counter">第${FM.ri+1}/${due.length}张</div><div class="fc-card-container"><div class="fc-card" onclick="flipCard()"><div class="fc-front"><div class="fc-label">正面</div><div class="fc-text">${esc(card.front)}</div></div><div class="fc-back"><div class="fc-label">背面</div><div class="fc-text">${esc(card.back)}</div></div></div></div><div class="fc-hint">点击翻转 · 空格键翻转</div><div class="fc-difficulty" id="fcDiff" style="display:none"><button class="diff-btn d1" onclick="rateCard(${card.id},1)">1再看</button><button class="diff-btn d2" onclick="rateCard(${card.id},2)">2吃力</button><button class="diff-btn d3" onclick="rateCard(${card.id},3)">3记住</button><button class="diff-btn d4" onclick="rateCard(${card.id},4)">4熟悉</button><button class="diff-btn d5" onclick="rateCard(${card.id},5)">5完美</button></div>`}
function flipCard(){FM.flipped=!FM.flipped;const el=document.querySelector('.fc-card');if(el){el.classList.toggle('flipped',FM.flipped);const d=document.getElementById('fcDiff');if(d)d.style.display=FM.flipped?'flex':'none'}}
function rateCard(id,d){FM.rate(id,d);FM.ri++;renderFlashcard()}
function createCard(){const f=document.getElementById('fcFront').value.trim();const b=document.getElementById('fcBack').value.trim();const s=document.getElementById('fcSubject').value;const tg=document.getElementById('fcTag').value.trim();if(!f||!b){alert('内容不能为空');return}FM.create(f,b,s,tg);document.getElementById('fcFront').value='';document.getElementById('fcBack').value='';document.getElementById('fcTag').value='';renderFlashcard()}
function renderFcBrowse(){const c=document.getElementById('fc-browse');const cards=FM.cards;const g={};cards.forEach(c=>{if(!g[c.subject])g[c.subject]=[];g[c.subject].push(c)});c.innerHTML=Object.entries(g).map(([s,list])=>{const cl=s==='数学'?'var(--math)':s==='数据结构'||s==='计组'?'var(--cs)':s==='英语'?'var(--eng)':'var(--text2)';return`<div class="subject-group"><h3 style="color:${cl}">${s}(${list.length})</h3><div class="card-list">${list.map(c=>`<div class="card-item" onclick="flipBrowseCard(${c.id})"><div class="front-preview">${esc(c.front)}</div><div class="meta">复习${c.reviewCount}次·下次<span class="due">${c.nextReview}</span>·<span class="tag">${c.tag}</span></div><div class="delete-btn" onclick="event.stopPropagation();delCard(${c.id})">删除</div></div>`).join('')}</div></div>`}).join('')}
function flipBrowseCard(id){const card=FM.cards.find(c=>c.id===id);if(!card)return;const item=document.querySelector(`.card-item[onclick="flipBrowseCard(${id})"]`);if(!item)return;const p=item.querySelector('.front-preview');if(p.dataset.flipped){p.textContent=card.front;p.dataset.flipped=''}else{p.textContent=card.back;p.dataset.flipped='1'}}
function delCard(id){if(confirm('确定删除？')){FM.del(id);renderFcBrowse()}}

// Review (daily reflection)
function renderReview(){
  const days=TM.getDays();
  const nav=document.getElementById('reviewDateNav');
  nav.innerHTML='<h3>每日复盘</h3>'+days.slice(-7).reverse().map(d=>{const o=new Date(d);const w=['日','一','二','三','四','五','六'][o.getDay()];const cls=d===RM.currentDay?'active':'';return`<button class="review-date-btn ${cls}" onclick="switchReviewDate('${d}')">${o.getMonth()+1}/${o.getDate()}周${w}</button>`}).join('');

  const existing=RM.getForDate(RM.currentDay);
  const tasks=TM.getForDay(RM.currentDay);
  const done=tasks.filter(t=>t.done).length;
  const studyTasks=tasks.filter(t=>t.done&&t.subject!=='class'&&t.subject!=='rest');
  const studyMins=studyTasks.reduce((s,t)=>s+TM.parseMinutes(t.time),0);

  const r=existing||{q1:'',q2:'',q3:'',q4:''};
  document.getElementById('reviewContent').innerHTML=`
    <div class="review-tasks-summary">今日完成<b>${done}/${tasks.length}</b>项任务，学习<b>${Math.round(studyMins/60)}h${studyMins%60}m</b></div>
    <div class="review-form">
      <div class="review-q"><label>今天最重要的知识点是什么？</label><div class="hint">写下1-2个核心收获</div><textarea id="rq1">${r.q1}</textarea></div>
      <div class="review-q"><label>哪道题/哪个概念卡住了？</label><div class="hint">标记具体难点，明天优先攻克</div><textarea id="rq2">${r.q2}</textarea></div>
      <div class="review-q"><label>时间分配合理吗？</label><div class="hint">反思是否有时间段浪费了</div><textarea id="rq3">${r.q3}</textarea></div>
      <div class="review-q"><label>明天最大的"石头"是什么？</label><div class="hint">最重要最难的任务，搬走它一天就成功</div><textarea id="rq4">${r.q4}</textarea></div>
      <button class="review-save" onclick="saveReview()">保存复盘</button>
    </div>`;

  // History
  const hist=RM.getDateList().slice(0,10);
  const hEl=document.getElementById('reviewHistory');
  if(hist.length){
    hEl.innerHTML='<h4 style="font-size:13px;margin-bottom:8px;color:var(--text2)">历史复盘</h4>'+hist.map(d=>{const rv=RM.getForDate(d);if(!rv)return'';const o=new Date(d);const w=['日','一','二','三','四','五','六'][o.getDay()];return`<div class="review-history-item" onclick="switchReviewDate('${d}')"><div class="date">${o.getMonth()+1}/${o.getDate()}周${w}</div><div class="summary">${rv.q1?'💡'+rv.q1.slice(0,40)+'...':'未填写'}</div></div>`}).join('');
  }else hEl.innerHTML='';
}
function switchReviewDate(d){RM.currentDay=d;renderReview()}
function saveReview(){
  RM.saveForDate(RM.currentDay,{date:RM.currentDay,q1:document.getElementById('rq1').value,q2:document.getElementById('rq2').value,q3:document.getElementById('rq3').value,q4:document.getElementById('rq4').value});
  renderReview();
}

// Progress
function renderProgress(){
  const g=document.getElementById('progressGrid');
  g.innerHTML=PM.progress.map((s,si)=>`<div class="progress-section"><h3><span class="dot" style="background:${s.color}"></span>${s.subject}</h3>${s.chapters.map((ch,ci)=>`<div class="chapter-row"><span class="name">${ch.name}</span><div class="bar-bg"><div class="bar-fill" style="width:${ch.pct}%;background:${ch.pct>=100?'var(--success)':ch.pct>0?s.color:'var(--border)'}"></div></div><span class="pct">${ch.pct}%</span></div>`).join('')}<div class="progress-edit-btn" onclick="editProgress(${si})">编辑进度</div></div>`).join('');
}
function editProgress(si){
  const s=PM.progress[si];
  const overlay=document.getElementById('progressEditOverlay');
  overlay.style.display='';
  overlay.innerHTML=`<div class="progress-edit-overlay" onclick="closeProgressEdit(event)"><div class="progress-edit-panel"><h3>${s.subject} - 编辑进度</h3>${s.chapters.map((ch,ci)=>`<div class="chapter-row"><span class="name">${ch.name}</span><input type="range" min="0" max="100" value="${ch.pct}" oninput="PM.updateChapter('${s.subject}',${ci},parseInt(this.value));this.nextElementSibling.textContent=this.value+'%'" style="flex:1"><span style="font-size:11px;min-width:30px;text-align:right">${ch.pct}%</span></div>`).join('')}<div class="btns"><button class="btn" onclick="closeProgressEdit();renderProgress()">完成</button></div></div></div>`;
}
function closeProgressEdit(e){if(e&&e.target!==e.currentTarget)return;document.getElementById('progressEditOverlay').style.display='none';renderProgress()}

// Tips
function renderTips(){
  const f=document.getElementById('tipsFilter');
  const filters=['all','math','cs','eng','other'];
  f.innerHTML=filters.map(s=>`<button class="tips-filter-btn ${TipM.filter===s?'active':''}" onclick="TipM.filter='${s}';renderTips()">${s==='all'?'全部':TipM.subjLabel(s)}</button>`).join('');

  const list=document.getElementById('tipsList');
  const tips=TipM.getFiltered().reverse();
  list.innerHTML=tips.length?tips.map(t=>`<div class="tip-item"><div class="content">${esc(t.content)}</div><div class="meta"><span class="tip-subject ${TipM.subjClass(t.subject)}">${TipM.subjLabel(t.subject)}</span><span>${t.created}</span><span class="tip-to-card" onclick="tipToCard(${t.id})">→转闪卡</span><span class="tip-del" onclick="delTip(${t.id})">删除</span></div></div>`).join(''):'<div class="fc-empty">还没有记录，赶快添加吧</div>';
}
function addTip(){const s=document.getElementById('tipSubject').value;const c=document.getElementById('tipContent').value.trim();if(!c){alert('内容不能为空');return}TipM.add(s,c);document.getElementById('tipContent').value='';renderTips()}
function delTip(id){if(confirm('确定删除？')){TipM.del(id);renderTips()}}
function tipToCard(id){const t=TipM.tips.find(t=>t.id===id);if(!t)return;FM.create(t.content,'(请补充答案/详细内容)',TipM.subjLabel(t.subject),'tips转卡');alert('已转为记忆卡片！请去记忆卡片→浏览中补充背面答案');renderTips()}

// Data
function exportData(){const data=DM.exportAll();const blob=new Blob([data],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`study-data-${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url)}
function importData(){const text=document.getElementById('importArea').value.trim();if(!text){alert('请粘贴JSON');return}try{const data=JSON.parse(text);DM.importAll(data);TM.tasks=DM.get('tasks');FM.cards=DM.get('cards');RM.reviews=DM.get('reviews');PM.progress=DM.get('progress');TipM.tips=DM.get('tips');renderTasks();renderFlashcard();renderReview();renderProgress();renderTips();alert('导入成功');document.getElementById('importArea').value=''}catch(e){alert('JSON错误:'+e.message)}}
function importFromFile(){document.getElementById('importFile').click()}
function handleFileImport(event){const file=event.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(e){document.getElementById('importArea').value=e.target.result;importData()};reader.readAsText(file);event.target.value=''}
function clearData(){if(confirm('确定清除所有数据？建议先导出备份！')){DM.clearAll();TM.tasks=[];FM.cards=[];RM.reviews=[];PM.progress=[];TipM.tips=[];TM.loadDefault();FM.loadDefault();PM.loadDefault();TipM.loadDefault();renderTasks();renderFlashcard();renderReview();renderProgress();renderTips();renderCountdown();alert('已清除并重新加载默认数据')}}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='ArrowRight'){
    const days=TM.getDays();const idx=days.indexOf(TM.currentDay);
    if(idx>=0){const ni=e.key==='ArrowLeft'?Math.max(0,idx-1):Math.min(days.length-1,idx+1);switchDay(days[ni])}
  }
  // 空格键翻转卡片
  if(e.key===' '&&curFcTab==='review'&&document.querySelector('.fc-card')&&!e.target.closest('input,textarea,select')){
    e.preventDefault();flipCard();
  }
});

// Init
TM.init();FM.init();RM.init();PM.init();TipM.init();
renderTasks();renderCountdown();
</script>
</body>
